[build]
command = "bun run build"
functions = "netlify/functions"
publish = "dist"

[[redirects]]
from = "/*"
status = 200
to = "/index.html"

# Cache headers for PWA
[[headers]]
for = "/"
[headers.values]
Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
for = "/index.html"
[headers.values]
Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
for = "/manifest.json"
[headers.values]
Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
for = "/service-worker.js"
[headers.values]
Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
for = "/*.css"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.(js|mjs)"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/icons/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[env]
NUXT_PUBLIC_SUPABASE_ANON_KEY = ""
NUXT_PUBLIC_SUPABASE_URL = ""
